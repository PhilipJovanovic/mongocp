services:
  mongocp:
    build: .
    ports:
      - "8080:8080"
    environment:
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: ${MONGO_DB:-mongocp}
      API_TOKEN: ${API_TOKEN:-dev-token}
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:8080}
    depends_on:
      - mongo

  mongo:
    image: mongo:8
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
